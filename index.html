<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parla | Latin American Slang Map</title>
  <meta name="description" content="Search Latin American slang and see equivalents across 6 countries in a visual diagram. Static JSON API included">
  <meta property="og:title" content="Parla | Latin American Slang Map">
  <meta property="og:description" content="Map regional slang across Chile, Colombia, Argentina, Mexico, Peru and Venezuela">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://parla.neorgon.com/">
  <meta property="og:site_name" content="Neorgon">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Parla -- Latin American Slang Map">
  <meta name="twitter:description" content="Map regional slang across Chile, Colombia, Argentina, Mexico, Peru and Venezuela">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://parla.neorgon.com/">
  <meta property="og:locale" content="en_US">
  <meta name="theme-color" content="#040714">
  <meta property="og:image" content="https://parla.neorgon.com/og-preview.jpg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <link rel="icon" type="image/x-icon" href="https://pub-b597cd281a384f98a47e1f043a6c4160.r2.dev/v1.0.0/favicon.ico" />
  <link rel="stylesheet" href="https://pub-b597cd281a384f98a47e1f043a6c4160.r2.dev/v1.0.0/styles/base.css">
    <link rel="stylesheet" href="css/style.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Parla",
    "description": "Search Latin American slang and see equivalents across 6 countries in a visual diagram",
    "url": "https://parla.neorgon.com/",
    "applicationCategory": "ReferenceApplication",
    "operatingSystem": "Any",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
    "author": { "@type": "Organization", "name": "Neorgon", "url": "https://neorgon.com/" }
  }
  </script>
</head>
<body>

  <a class="skip-link" href="#main">Skip to content</a>

  <header class="header-bar">
    <div class="header-logo">
      <a href="https://neorgon.com/" target="_blank" rel="noopener noreferrer">
        <img src="energon-classic-logo.png" class="header-logo-img" alt="Logo">
      </a>
      <a href="./" class="header-title-link">
        <h1>Parla</h1>
        <div class="header-subtitle">Latin American Slang Map</div>
      </a>
    </div>
    <a class="header-home" href="https://neorgon.com/" title="neorgon.com" aria-label="Neorgon home">
      <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
      </svg>
    </a>
  </header>

  <div class="bg-shapes" id="bgShapes" aria-hidden="true">
    <div class="globe-capitals" id="globeCapitals"></div>
    <div class="globe-card hidden" id="globeCard"></div>
  </div>

  <main id="main">
    <div class="container">

      <button type="button" class="word-of-day" id="wordOfDay" aria-label="Palabra del día: abrir en el mapa"></button>

      <div class="search-area">
        <label class="field-label" for="searchInput">Buscar</label>
        <div class="search-wrap">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
          </svg>
          <input type="search" id="searchInput" class="search-input" placeholder="bacán, chido, pega, flaite…" autocomplete="off" spellcheck="false" enterkeyhint="search">
          <button type="button" class="search-clear hidden" id="searchClear" aria-label="Borrar búsqueda">&times;</button>
        </div>
        <div class="filter-bar">
          <div class="filter-field">
            <label class="field-label" for="countrySelect">País</label>
            <select class="filter-select" id="countrySelect"></select>
          </div>
          <div class="filter-field">
            <label class="field-label" for="categorySelect">Categoría</label>
            <select class="filter-select" id="categorySelect"></select>
          </div>
        </div>
      </div>

      <div class="results-area" id="resultsArea">
        <div class="intro-state" id="introState">
          <p class="intro-text">Busca jerga latinoamericana y mira los equivalentes en cada país</p>
          <div class="intro-examples" id="introExamples"></div>
        </div>
      </div>

    </div>

    <div class="diagram-area hidden" id="diagramArea">
      <svg class="diagram-lines" id="diagramLines"></svg>
      <div class="diagram-center" id="diagramCenter"></div>
      <div class="diagram-nodes" id="diagramNodes"></div>
    </div>

    <div class="container">
      <div class="browse-area" id="browseArea"></div>
    </div>
  </main>

  <footer class="info-footer">
    Part of <a class="footer-link" href="https://neorgon.com/">Neorgon</a>
  </footer>

  <script type="module" src="js/app.js"></script>
</body>
</html>
